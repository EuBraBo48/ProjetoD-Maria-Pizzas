<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Maria Pizzas</title>
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="banner"></div>
        <div class="header-content">
            <div class="logo">DM</div>
            <div class="info">
                <h1>D'Maria Pizzas</h1>
                <div class="status-container">
                    <span id="store-status" class="status-badge">Analisando...</span>
                    <span class="hours">Aberto até 23:00</span>
                    <div class="admin-login-wrapper" style="max-width: 600px; margin: 0 auto; width: 100%; display: flex; justify-content: flex-end; padding: 10px 20px; background-color: var(--surface);">
    <button onclick="abrirModal('admin-auth-modal')" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);" title="Área do Adm">
        👤
    </button>
                    </div>
                </div>
                <div class="schedule-days" id="schedule-days">
                    </div>
            </div>
        </div>
    </header>

    <nav class="categories" id="category-nav">
        </nav>

    <main>
        <div class="section-title">
            <h2>Cardápio</h2>
        </div>
        <div class="products-grid" id="products-grid">
            </div>
    </main>

    <div class="floating-cart" id="floating-cart" onclick="openCart()">
        <div class="cart-info">
            <span class="cart-icon">🛒</span>
            <span id="floating-cart-count">0 itens</span>
        </div>
        <div class="cart-total" id="floating-cart-total">R$ 0,00</div>
    </div>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('product-modal')">×</button>
            <img id="modal-img" src="" alt="Produto">
            <h3 id="modal-title">Nome</h3>
            <p id="modal-desc">Descrição</p>
            <div class="price" id="modal-price">R$ 0,00</div>
            
            <div class="obs-container">
                <label for="modal-obs">Alguma observação?</label>
                <textarea id="modal-obs" placeholder="Ex: Tirar cebola, maionese à parte..."></textarea>
            </div>

            <div class="modal-footer">
                <div class="quantity-control">
                    <button onclick="changeModalQty(-1)">-</button>
                    <span id="modal-qty">1</span>
                    <button onclick="changeModalQty(1)">+</button>
                </div>
                <button class="btn-primary" onclick="addToCart()">
                    Adicionar • <span id="modal-btn-price">R$ 0,00</span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content cart-content">
            <button class="close-btn" onclick="closeModal('cart-modal')">×</button>
            <div class="modal-header">
                <h3>Seu Carrinho</h3>
                <button class="btn-clear" onclick="clearCart()">Limpar</button>
            </div>
            
            <div id="cart-items" class="cart-items">
                </div>

            <div class="cart-summary">
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">R$ 0,00</span>
                </div>
                <div class="summary-line total">
                    <span>Total</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
            </div>

            <button class="btn-primary btn-block" onclick="openCheckout()">Finalizar Pedido</button>
        </div>
    </div>

    <div class="modal" id="checkout-modal">
        <div class="modal-content checkout-content">
            <button class="close-btn" onclick="closeModal('checkout-modal')">×</button>
            <h3>Finalizar Pedido</h3>
            
            <form id="checkout-form" onsubmit="finishOrder(event)">
                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" id="client-name" required placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>Telefone (WhatsApp) *</label>
                    <input type="tel" id="client-phone" required placeholder="(00) 00000-0000">
                </div>
                
                <div class="form-group">
                    <label>Tipo de entrega *</label>
                    <div class="delivery-options">
                        <label>
                            <input type="radio" name="delivery-type" value="delivery" checked onchange="toggleAddress()"> Entrega
                        </label>
                        <label>
                            <input type="radio" name="delivery-type" value="pickup" onchange="toggleAddress()"> Retirar na Loja
                        </label>
                    </div>
                </div>

                <div id="address-fields">
                    <div class="form-group">
                        <label>Rua *</label>
                        <input type="text" id="address-street" placeholder="Nome da rua">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Número *</label>
                            <input type="text" id="address-number" placeholder="123">
                        </div>
                        <div class="form-group">
                            <label>Bairro *</label>
                            <input type="text" id="address-neighborhood" placeholder="Seu bairro">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Ponto de Referência</label>
                        <input type="text" id="address-ref" placeholder="Próximo a...">
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-block">Enviar Pedido (WhatsApp)</button>
            </form>
        </div>
    </div>


    <script src="src/script.js"></script>

    <div id="admin-auth-modal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('admin-auth-modal')">&times;</button>
        <div class="modal-header">
            <h2>Login do Administrador</h2>
        </div>
        <form id="admin-login-form" onsubmit="loginAdmin(event)">
            <div class="form-group">
                <label for="admin-user">Usuário</label>
                <input type="text" id="admin-user" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="admin-pass">Senha</label>
                <input type="password" id="admin-pass" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary btn-block">Entrar no Painel</button>
        </form>
    </div>
</div>
<div id="admin-panel-modal" class="modal">
    <div class="modal-content" style="max-height: 95vh;">
        <button class="close-btn" onclick="fecharPainelAdmin()">&times;</button>
        <div class="modal-header" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <h2>Painel Admin - Cardápio</h2>
            <button class="btn-primary" onclick="abrirFormProduto()" style="padding: 8px 15px; font-size: 14px; border-radius: 8px;">+ Adicionar Produto</button>
        </div>
        
        <div id="product-form-container" style="display: none; background: #f9f9f9; padding: 15px; border-radius: var(--radius); margin-bottom: 20px; border: 1px solid #ddd;">
            <h3 id="form-title" style="margin-bottom: 10px;">Novo Produto</h3>
            <form id="product-crud-form" onsubmit="salvarProdutoCrud(event)">
                <input type="hidden" id="crud-id">
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="crud-nome" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="crud-descricao" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Preço (Ex: 42.90)</label>
                        <input type="number" step="0.01" id="crud-preco" required>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="crud-categoria" style="width: 100%; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;">
                            <option value="Pizzas">Pizzas</option>
                            <option value="Brotinhos">Brotinhos</option>
                            <option value="Açaí">Açaí</option>
                            <option value="Bebidas">Bebidas</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
    <label>Foto do Produto</label>
    <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
        <button type="button" class="btn-edit" onclick="document.getElementById('crud-imagem-file').click()" style="padding: 10px 15px; display: flex; align-items: center; gap: 5px;">
            📁 Escolher Foto
        </button>
        <input type="file" id="crud-imagem-file" accept="image/*" style="display: none;" onchange="carregarImagemLocal(event)">
        
        <span id="crud-imagem-nome" style="font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;">
            Nenhuma foto selecionada
        </span>
    </div>
    <input type="hidden" id="crud-imagem-atual">
</div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-primary" style="padding: 10px;">Salvar</button>
                    <button type="button" class="btn-clear" onclick="cancelarFormProduto()" style="border: 1px solid #ddd; padding: 10px; border-radius: var(--radius);">Cancelar</button>
                </div>
            </form>
        </div>

        <div id="admin-products-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            </div>
    </div>
</div>
</body>
</html>
